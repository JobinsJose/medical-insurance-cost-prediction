<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insurance Prediction Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7fa;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 30px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: 28px;
            color: #2a9d8f;
            margin-bottom: 10px;
        }

        h4 {
            font-size: 18px;
            color: #264653;
            margin-bottom: 30px;
        }

        .confidence {
            background-color: #e0f7fa;
            padding: 15px;
            border-left: 6px solid #2a9d8f;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .shap-section h3 {
            margin-top: 40px;
            font-size: 22px;
            color: #264653;
        }

        .shap-section img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 10px;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            font-size: 14px;
            color: #aaa;
        }

    </style>
</head>
<body>
    <div class="container">
        <h2> Predicted Medical Charges: <strong><span style="color: maroon;">${{ predictions }}</span></strong></h2>

        <div class="confidence">
            <h4> 95% Confidence Interval</h4>
            <p><strong>${{ lower }} - ${{ upper }}</strong></p>
        </div>

        <div class="shap-section">
            <h3> Prediction Explanation (SHAP)</h3>
            <img src="{{ shap_image }}" alt="SHAP Explanation">
        </div>
    </div>

    <footer>
        &copy; {{ year }} Medical Expense Predictor — All rights reserved.
    </footer>
</body>
</html>
