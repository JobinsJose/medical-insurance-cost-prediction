<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Evaluation Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f7f7f7; }
        .row { display: flex; flex-wrap: wrap; margin-bottom: 30px; }
        .column { flex: 1; padding: 10px; min-width: 250px; }
        .card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
        }
        h2, h3 { color: #333; }
        img.plot-img { width: 100%; height: auto; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>Model Evaluation Dashboard</h2>

    <div class="row">
        <div class="column">
            <div class="card">
                <h3>R² Score</h3>
                <p>{{ r2 }}</p>
            </div>
        </div>
        <div class="column">
            <div class="card">
                <h3>RMSE</h3>
                <p>{{ rmse }}</p>
            </div>
        </div>
        <div class="column">
            <div class="card">
                <h3>MAE</h3>
                <p>{{ mae }}</p>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="column">
            <div class="card">
                <h3>Actual vs Predicted</h3>
                <img src="{{ url_for('static', filename='img/actual_vs_pred.png') }}" class="plot-img">
            </div>
        </div>
        <div class="column">
            <div class="card">
                <h3>Residual Plot</h3>
                <img src="{{ url_for('static', filename='img/residual_plot.png') }}" class="plot-img">
            </div>
        </div>
    </div>

    <div class="row">
        <div class="column">
            <div class="card">
                <h3>Overall SHAP Summary</h3>
                <img src="{{ url_for('static', filename='img/shap_summary.png') }}" class="plot-img">
            </div>
        </div>
        <div class="column">
            <div class="card">
                <h3>Histogram of Residuals</h3>
                <img src="{{ url_for('static', filename='img/residual_hist.png') }}" class="plot-img">
            </div>
        </div>
    </div>

</body>
</html>
